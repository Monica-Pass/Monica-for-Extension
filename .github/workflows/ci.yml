name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          cache: npm
      - run: npm run verify:toolchain
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run release:check
      - run: npm run package:verify
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: monica-extension
          path: release/*
          if-no-files-found: error
      - name: Attest release package provenance
        if: github.event_name == 'push' && github.event.repository.private == false
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/monica-extension-*.zip
